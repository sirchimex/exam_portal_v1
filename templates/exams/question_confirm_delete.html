{% extends 'base.html' %}
{% block title %}Delete Question{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <div class="text-danger fs-1 mb-2"><i class="bi bi-trash"></i></div>
      <h5 class="fw-bold mb-2">Delete Question?</h5>
      <p class="text-muted">Delete this question from <strong>{{ object.exam.title }}</strong>?</p>
      <p class="bg-light rounded p-2 small text-start">{{ object.text }}</p>
      <form method="post" class="d-flex justify-content-center gap-2 mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'exam_questions' object.exam.pk %}" class="btn btn-light">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
