{% extends 'base.html' %}
{% block title %}Delete Exam{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <div class="text-danger fs-1 mb-2"><i class="bi bi-exclamation-triangle"></i></div>
      <h5 class="fw-bold mb-2">Delete Exam?</h5>
      <p class="text-muted">Are you sure you want to delete <strong>"{{ object.title }}"</strong>?
        This will also delete all questions and student results. This cannot be undone.</p>
      <form method="post" class="d-flex justify-content-center gap-2 mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'exam_list' %}" class="btn btn-light">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
